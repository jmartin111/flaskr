<!DOCTYPE html>
<html lang="en">

{% extends 'base.html' %}
    <h1>{% block title %}Commenting on {{ post['title'] }}"</h1>
{% endblock %}

{% block content %}
    <form method="post">
        <label for="body">Comment</label>
            <textarea name="body" id="body" required autofocus>
                {{ request.form['comment'] }}
            </textarea>
        <input type="submit" value="Submit">
        <a href="{{ url_for('blog.index') }}">Cancel</a>
    </form>
{% endblock %}
