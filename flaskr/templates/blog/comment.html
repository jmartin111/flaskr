<!DOCTYPE html>
<html lang="en">

{% extends 'base.html' %}
    <h1>{% block title %}Commenting on {{ post['title'] }}"</h1>
{% endblock %}

{% block content %}
    <form method="post">
        <label for="comment">Comment</label>
            <textarea name="comment" id="comment">{{ request.form['comment'] }}</textarea>
        <input type="submit" value="Submit">
    </form>
{% endblock %}
