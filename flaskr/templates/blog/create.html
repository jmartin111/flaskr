{% extends 'base.html' %}

{% block header %}
    <h1>{% block title %}New Post{% endblock %}</h1>
{% endblock %}

{% block content %}
    <form method="post">
        <label for="updated_on">Last Update: </label>
            <h2 id="updated_on" name="updated_on" value="{{ request.form['updated_on'] }}">
                {{ request.form['updated_on'] }}
            </h2>
        <label for="title">Title</label>
            <input name="title" id="title" value="{{ request.form['title'] }}" required autofocus>
        <label for="body">Body</label>
            <textarea name="body" id="body" value="{{ request.form['body'] }}"></textarea>
        <input type="submit" value="Save">
    </form>
{% endblock %}
